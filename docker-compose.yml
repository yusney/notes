services:
  db:
    image: postgres:16-alpine
    container_name: notes_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notes_db}
      POSTGRES_USER: ${POSTGRES_USER:-notes_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notes_password}
    ports:
      - "5432:5432"
    volumes:
      - notes_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notes_user} -d ${POSTGRES_DB:-notes_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notes_api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-notes_db};Username=${POSTGRES_USER:-notes_user};Password=${POSTGRES_PASSWORD:-notes_password}"
      Jwt__Secret: ${Jwt__Secret:-CHANGE_ME_USE_DOT_ENV_FILE}
      Jwt__Issuer: ${Jwt__Issuer:-notes-api}
      Jwt__Audience: ${Jwt__Audience:-notes-client}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  notes_pg_data:
    driver: local
