name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Build + Test ───────────────────────────────────────────────────
  backend:
    name: Backend (Build & Test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore notes.slnx

      - name: Build
        run: dotnet build notes.slnx --no-restore -c Release

      - name: Test
        run: dotnet test notes.slnx --no-build -c Release --verbosity normal

  # ── Frontend: Lint + Test ───────────────────────────────────────────────────
  frontend:
    name: Frontend (Lint & Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm exec vitest run

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: http://localhost:8080

  # ── Docker: Build + Publish to GHCR ───────────────────────────────────────
  docker-publish:
    name: Docker Build & Publish
    runs-on: ubuntu-latest
    needs: backend
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Tauri: Desktop build (Linux) ───────────────────────────────────────────
  tauri-build:
    name: Tauri Desktop Build (Linux)
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: desktop

      - name: Build Tauri app (Linux)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: --target x86_64-unknown-linux-gnu
        env:
          VITE_API_BASE_URL: http://localhost:8080

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: notes-linux-${{ github.sha }}
          path: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
